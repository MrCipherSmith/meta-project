name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # --- Execution Observability CI Protocol (ci-protocol.md) -----------------
  # Four jobs replace the former single `check`. The point is the baseline gate:
  # a PR's `standard validate` result is only trustworthy once the SAME check has
  # been run independently on `main` and the two statuses classified, so a
  # pre-existing main defect is not misread as a PR regression.

  typecheck-and-tests:
    name: typecheck-and-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck and tests
        run: bun run check

      - name: Security red-team FN-rate gate (Block E / E6)
        run: bun ./src/cli.ts security eval --corpus all

  standard-baseline:
    # Independently measure `main` so `standard-pr` can classify against it.
    name: standard-baseline
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.baseline.outputs.status }}
    steps:
      - name: Check out main (independent baseline)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # A red baseline is DATA (baseline-red), not a job failure: it tells
      # `standard-pr` that a PR failure is diagnostic, not an isolated regression.
      # So capture pass/fail into a job output and never let a non-zero
      # `standard validate` exit fail this job.
      - name: Validate main and publish provenance
        id: baseline
        run: |
          if bun ./src/cli.ts standard validate; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

  standard-pr:
    name: standard-pr
    runs-on: ubuntu-latest
    needs: standard-baseline
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # Measure the PR status independently; the classification step below owns
      # this job's verdict, so do not hard-fail here.
      - name: Validate the PR
        id: pr
        run: |
          if bun ./src/cli.ts standard validate; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
          fi

      # Classification-only. CI owns both independently measured statuses and
      # passes them in. This step exits non-zero ONLY for baseline-green + pr-fail
      # (an isolated PR regression); baseline-red / baseline-unknown exit zero.
      - name: Classify the PR against the main baseline
        run: |
          bun ./src/cli.ts standard baseline \
            --baseline "${{ needs.standard-baseline.outputs.status }}" \
            --pr "${{ steps.pr.outputs.status }}"

  metrics-contract:
    # Schema, provenance, latest-pointer, worktree-safe hook, and lightweight-mode
    # tests for the execution-observability runtime.
    name: metrics-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Observability contract tests
        run: bun test src/metrics/service.test.ts src/lib/git-hooks.test.ts src/lib/templates.test.ts

  tui-pty-launch:
    # O-6. Every other check that touches the TUI runs without a controlling
    # terminal, so `createCliRenderer` declines and the shell takes the readline
    # path — the renderer is proven only headlessly, and NOTHING proved the
    # shipped `keryx shell` launches and draws on a real terminal. Flow 065 is
    # the precedent: a stdin-handoff bug that leaked terminal query responses
    # ONLY on a real TTY reverted the TUI out of the default, and took flows 066
    # and 067 to fix. This job is what would have caught it.
    #
    # macOS only, deliberately. The suite allocates its pty with BSD `script`,
    # whose command syntax differs from util-linux's; the Linux form is NOT
    # exercised, so it is not shipped. Adding a Linux leg means writing and
    # verifying that branch first — and narrowing O-6 further in
    # docs/requirements/keryx-opentui-shell/specification.md.
    #
    # Not folded into `check` (ubuntu, where it would only ever skip) and not
    # into the default `bun test` (it spawns real processes, so it follows the
    # repository's KERYX_ALLOW_REAL_SUBPROCESS convention). ~40s, one runner.
    name: TUI launches on a real pty (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      # The gate is `darwin` + `/usr/bin/script`. If the runner image ever drops
      # `script`, the suite would SKIP and this job would go green having proven
      # nothing — so fail here instead, where the reason is legible.
      - name: Confirm a pty allocator is present
        run: test -x /usr/bin/script

      # `bun test` counts a skip as neither pass nor fail, so a gate that
      # silently closed would leave this job green and vacuous. Reuse the same
      # zero-skip guard the OpenTUI matrix uses.
      - name: Launch the real shell on an allocated pty (fail on skip)
        env:
          KERYX_ALLOW_REAL_SUBPROCESS: "1"
        run: bun ./scripts/opentui-tests-no-skips.ts src/commands/shell-pty-launch.smoke.test.ts

  linux-sandbox:
    # Live validation of the LINUX OS-sandbox path (bubblewrap). The `check` job
    # skips every sandbox smoke because they are gated behind
    # KERYX_ALLOW_REAL_SUBPROCESS=1 — without this job the bwrap path is covered
    # only by unit tests of argv construction, never by a real contained spawn.
    name: linux sandbox (bubblewrap) live smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install bubblewrap
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Confirm the launcher is present
        run: bwrap --version

      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor, which
      # bwrap requires. Without this the launcher cannot start at all — and a
      # broken launcher looks a lot like "everything was contained".
      - name: Allow unprivileged user namespaces
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      # Fail LOUDLY (with bwrap's own stderr) if containment cannot run here,
      # instead of letting the smokes fail with a bare "file was not created".
      # Mirrors buildBwrapArgs' flag set, `--unshare-pid` included: a kernel or
      # runner that cannot create a PID namespace then fails HERE, with bwrap's
      # own stderr, instead of surfacing as an inscrutable assertion inside a
      # smoke test.
      - name: Sanity-check that bwrap can actually contain a process
        run: |
          bwrap --ro-bind / / --dev /dev --proc /proc --tmpfs /tmp \
                --unshare-pid --unshare-ipc --unshare-net --die-with-parent --new-session \
                -- /bin/echo bwrap-can-run

      - name: OS-sandbox live smokes (real subprocesses under bwrap)
        env:
          KERYX_ALLOW_REAL_SUBPROCESS: "1"
        run: |
          bun test \
            src/harness/process/sandbox/sandbox.smoke.test.ts \
            src/harness/process/real-process-adapter.smoke.test.ts \
            src/commands/harness-exec.smoke.test.ts \
            src/commands/harness-exec-restricted.smoke.test.ts

  opentui-native-matrix:
    # O-3 (flow 114). PRD N1 claims prebuilt `@opentui/core` native binaries
    # cover keryx's four target platforms, the install path pulls them, and no
    # Zig toolchain is needed. Only darwin-arm64 had ever been exercised
    # (ADR-0005). This matrix exercises all four as hosted runners.
    #
    # The dependency is optional, dynamically imported and fallback-guarded, so a
    # MISSING binary does not error — `keryx shell` silently degrades to readline
    # and every suite still passes. "No error" is therefore not evidence. Both
    # steps below are POSITIVE: one dlopen's the native library and round-trips a
    # byte through Zig-owned memory; the other fails the job if any OpenTUI test
    # skips (a skip == the binary did not resolve == vacuous coverage).
    #
    # ONGOING COST (AC12): this adds FOUR hosted runners to every future PR and
    # push to main — two Ubuntu (x64 + arm64) and two macOS (arm64 + Intel).
    # The cost is NOT money: this repository is public, and standard hosted
    # runners are free with no minute limit for public repos, macOS included.
    # What it actually costs is (a) ~30s of extra wall-clock per PR — the legs
    # run in parallel and each takes 11-28s — (b) queue time, since the free
    # tier's concurrency ceiling for macOS is lower than for Linux, so two
    # macOS legs can wait when several PRs land at once, and (c) four more
    # places that can go red for reasons unrelated to the change under review,
    # e.g. a runner-image or label change upstream (macos-13 was retired
    # mid-flight while this matrix was being written).
    # These legs are deliberately NOT required status checks — only
    # "typecheck, tests, standard" is — so a red leg informs without blocking.
    # Whoever next edits CI is trading the above for continuous proof of N1's
    # platform claim; drop a leg only by also reopening O-3 in the specification.
    name: opentui native (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      # One platform's missing binary must not cancel the others' evidence.
      fail-fast: false
      matrix:
        include:
          # Runner labels verified against GitHub's hosted-runner offering on
          # 2026-07-22 (docs.github.com "GitHub-hosted runners" + actions/
          # runner-images). arm64 Linux is free/unlimited on public repos.
          - target: linux-x64
            runner: ubuntu-latest # ubuntu-24.04, x64 (GA)
          - target: linux-arm64
            runner: ubuntu-24.04-arm # arm64 (GA for public repos)
          - target: darwin-arm64
            runner: macos-latest # macos-15, arm64 (GA)
          # macos-13 (the description's proposed Intel label) RETIRED 2025-12-04.
          # macos-15-intel is the current — and last — hosted x86_64 macOS image
          # (available through Aug 2027 per actions/runner-images#13027/#13045).
          - target: darwin-x64
            runner: macos-15-intel # macos-15, x64/Intel
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # No Zig toolchain is installed anywhere in this job — that absence is part
      # of the N1 claim, and the verifier below asserts `zig` is not on PATH.
      - name: Install dependencies (pulls the prebuilt native binary, no toolchain)
        run: bun install

      # AC2 — POSITIVE proof the platform-specific prebuilt binary resolved:
      # imports `@opentui/core-<platform>-<arch>`, dlopen's it via the FFI loader,
      # and round-trips a byte through native memory. Fails LOUDLY (in the spirit
      # of the linux-sandbox job) if the native layer is not really there.
      - name: Assert the @opentui/core native binary resolved (positive check)
        run: bun ./scripts/verify-opentui-native.ts

      # AC3 — run the OpenTUI-dependent suites and FAIL if any test skips. A skip
      # means the optional dependency did not resolve on this runner, so a
      # green-with-skips run would be vacuous evidence of the platform claim.
      - name: Run OpenTUI-dependent tests with zero skips (fail on skip)
        run: bun ./scripts/opentui-tests-no-skips.ts src/tui

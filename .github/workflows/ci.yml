name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: typecheck, tests, standard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck and tests
        run: bun run check

      - name: Validate Metaproject Standard compliance
        run: bun ./src/cli.ts standard validate
